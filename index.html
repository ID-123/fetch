<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Adaptación responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mini Gestor de Tareas</title>

    <!-- Conexión con CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Contenedor principal -->
    <main class="container">
      <h1>Mini Gestor de Tareas</h1>

      <!-- FORMULARIO -->
      <form id="taskForm">
        <!-- Input de tarea -->
        <input type="text" id="taskInput" placeholder="Escribe una tarea" />

        <!-- Botón agregar -->
        <button type="submit">Agregar</button>
      </form>

      <!-- Mensajes dinámicos -->
      <p id="message"></p>

      <!-- Lista de tareas -->
      <ul id="taskList"></ul>

      <!-- Botón sincronizar API -->
      <button id="syncButton">Sincronizar con API</button>
    </main>

    <!-- Conexión con JavaScript -->
    <script src="app.js"></script>
  </body>
</html>
